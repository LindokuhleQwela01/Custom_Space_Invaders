<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Space_Invaders_Home_Page</title>
    <link rel="stylesheet" href="./src/styling.css">
</head>
<body>

    
    <audio id="bgMusic" src="./Sounds/AC_DC-Shoot-to-Thrill.mp3" autoplay loop></audio>
    
    <div width="2500" height="2500" class="starfield">
        <div class="star"></div>
        <div class="star"></div> 
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div id="title-screen" class="banner">
            <div class="content">
                <h2>
                    <b>Space Invaders</b>
                </h2>
                <br>
                <br>
                <br>
                <h3>
                    <button id="start-game" onclick="location.href='./src/page_2.html'">
                        START GAME       
                    </button>
                </h3>
            </div>
        </div>
    </div>

    <script>const audio = document.getElementById("bgMusic");

  // Save playback position before leaving
  window.addEventListener("beforeunload", () => {
    localStorage.setItem("musicTime", audio.currentTime);
  });
  
  
  window.addEventListener("load", () => {
    const time = localStorage.getItem("musicTime");
    if (time) {
      audio.currentTime = time;
    }
    audio.play();
  });
  </script>
    

   
</body>
</html>
